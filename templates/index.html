<!DOCTYPE html>
<html>
<head>
    <title>Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-dark text-white">

<div class="container mt-4">

    <div class="d-flex justify-content-between">
        <h2>🎓 Student Dashboard</h2>
        <a href="/logout" class="btn btn-danger">Logout</a>
    </div>

    <hr>

    <!-- Stats Card -->
    <div class="card bg-primary text-white p-3 mb-3">
        <h4>Total Students: {{count}}</h4>
    </div>

    <!-- Add Student -->
    <div class="card p-3 mb-3">
        <form method="POST" action="/add" class="row g-2">
            <div class="col"><input class="form-control" name="name" placeholder="Name" required></div>
            <div class="col"><input class="form-control" name="age" placeholder="Age" required></div>
            <div class="col"><input class="form-control" name="course" placeholder="Course" required></div>
            <div class="col"><button class="btn btn-success w-100">Add</button></div>
        </form>
    </div>

    <!-- Search -->
    <form method="GET" action="/search" class="mb-3">
        <input class="form-control" name="q" placeholder="Search student">
    </form>

    <!-- Table -->
    <table class="table table-dark table-striped">
        <tr>
            <th>Name</th>
            <th>Age</th>
            <th>Course</th>
            <th>Action</th>
        </tr>

        {% for s in students %}
        <tr>
            <td>{{s[1]}}</td>
            <td>{{s[2]}}</td>
            <td>{{s[3]}}</td>
            <td>
                <a href="/edit/{{s[0]}}" class="btn btn-warning btn-sm">Edit</a>
                <a href="/delete/{{s[0]}}" class="btn btn-danger btn-sm">Delete</a>
            </td>
        </tr>
        {% endfor %}

    </table>

</div>

</body>
</html>
